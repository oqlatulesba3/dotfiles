# Variety wallpaper manager
bindd = SUPER ALT, N, Variety next, exec, variety -n
bindd = SUPER ALT, P, Variety previous, exec, variety -p
bindd = SUPER ALT, F, Variety favorite, exec, variety -f
bindd = SUPER ALT, T, Variety trash, exec, variety -t

# MPV Media Controls
bindd = SUPER ALT, BACKSLASH, MPV Play/Pause, exec, playerctl --player=mpv play-pause
bindd = SUPER ALT, BRACKETLEFT, MPV Previous, exec, playerctl --player=mpv previous
bindd = SUPER ALT, BRACKETRIGHT, MPV Next, exec, playerctl --player=mpv next
bindd = SUPER ALT, MINUS, MPV Seek Backward, exec, playerctl --player=mpv position 10-
bindd = SUPER ALT, EQUAL, MPV Seek Forward, exec, playerctl --player=mpv position 10+

