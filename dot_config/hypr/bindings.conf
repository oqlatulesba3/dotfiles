# # Control scratchpad
# bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
# bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# # TAB between workspaces
# bindd = SUPER CTRL, TAB, Former workspace, workspace, previous
unbind = SUPER, TAB
bindd = SUPER, TAB, Next workspace, exec, ~/.config/hypr/cycle_workspace.sh next
bindd = SUPER ALT, L, Next workspace, exec, ~/.config/hypr/cycle_workspace.sh next
unbind = SUPER SHIFT, TAB
bindd = SUPER SHIFT, TAB, Previous workspace, exec, ~/.config/hypr/cycle_workspace.sh prev
bindd = SUPER ALT, H, Previous workspace, exec, ~/.config/hypr/cycle_workspace.sh prev

# # Move workspaces to other monitors
# bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
# bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
# bindd = SUPER SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
# bindd = SUPER SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d
bindd = SUPER SHIFT ALT, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# # Swap active window with the one next to it with SUPER + SHIFT + arrow keys
# bindd = SUPER SHIFT, LEFT, Swap window to the left, swapwindow, l
# bindd = SUPER SHIFT, RIGHT, Swap window to the right, swapwindow, r
# bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
# bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

